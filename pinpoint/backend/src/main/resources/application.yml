spring:
  application:
    name: pinpoint

  # 기본 프로필: PostgreSQL (docker compose up -d 로 로컬에 띄운 컨테이너 사용)
  # H2 인메모리로 돌리려면 --spring.profiles.active=h2 (application-h2.yml 참고)
  datasource:
    url: jdbc:postgresql://localhost:5432/pinpoint
    driver-class-name: org.postgresql.Driver
    username: pinpoint
    password: pinpoint_dev_password

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

# 리포트 다운로드를 PRO 플랜으로 제한할지 여부. 결제 UI가 아직 없으면 false로 두고 개발을 이어간다.
feature:
  report-plan-restriction-enabled: false

jwt:
  secret: "change-this-secret-key-before-production-32bytes-minimum"
  access-token-expiration-ms: 3600000      # 1시간
  refresh-token-expiration-ms: 1209600000  # 14일
