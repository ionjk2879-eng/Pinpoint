services:
  postgres:
    image: postgres:16-alpine
    container_name: pinpoint-postgres
    environment:
      POSTGRES_DB: pinpoint
      POSTGRES_USER: pinpoint
      POSTGRES_PASSWORD: pinpoint_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pinpoint-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pinpoint -d pinpoint"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pinpoint-postgres-data:
